name: Frontend CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build
